name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      # The Node version above is pinned (.nvmrc), but the npm version bundled
      # with a given Node build isn't — GitHub's runner shipped an npm old
      # enough to reject a lockfile written by the locally Volta-pinned npm
      # version (invalid/missing picomatch entries on `npm ci`, despite the
      # same lockfile installing cleanly locally). Install the exact npm
      # version pinned in package.json's `volta.npm` field so CI always
      # matches local dev, instead of hardcoding the version here too.
      - run: npm install -g npm@$(node -p "require('./package.json').volta.npm")

      - run: npm ci

      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

      # Prismic calls in react-router.config.ts/app/routes.ts fall back to
      # empty results on failure (see AGENTS.md), so this succeeds even
      # without PRISMIC_* secrets configured — it just won't prerender any
      # page/case_study routes in that case. Add repo secrets with the same
      # names as .env.local.example for a build that reflects real content.
      - run: npm run build
        env:
          PRISMIC_ENVIRONMENT: ${{ secrets.PRISMIC_ENVIRONMENT }}
          PRISMIC_ACCESS_TOKEN: ${{ secrets.PRISMIC_ACCESS_TOKEN }}
