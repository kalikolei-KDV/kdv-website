name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - run: npm ci

      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

      # Prismic calls in react-router.config.ts/app/routes.ts fall back to
      # empty results on failure (see AGENTS.md), so this succeeds even
      # without PRISMIC_* secrets configured — it just won't prerender any
      # page/case_study routes in that case. Add repo secrets with the same
      # names as .env.local.example for a build that reflects real content.
      - run: npm run build
        env:
          PRISMIC_ENVIRONMENT: ${{ secrets.PRISMIC_ENVIRONMENT }}
          PRISMIC_ACCESS_TOKEN: ${{ secrets.PRISMIC_ACCESS_TOKEN }}
